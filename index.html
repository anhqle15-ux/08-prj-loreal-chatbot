<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal Beauty Advisor</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <div class="brand-block">
          <img
            src="img/loreal-logo.png"
            alt="L'Oréal logo"
            class="brand-logo"
          />
          <div class="brand-copy">
            <p class="brand-eyebrow">L'Oréal Paris</p>
            <h1 class="site-title">Smart Beauty Advisor</h1>
          </div>
        </div>
      </header>

      <main>
        <section class="chatbox">
          <div
            id="chatWindow"
            class="chat-window"
            role="log"
            aria-live="polite"
          >
            <!-- messages will be appended here via JS -->
          </div>

          <form id="chatForm" class="chat-form">
            <div
              id="typingIndicator"
              class="typing-indicator"
              aria-live="polite"
            >
              <span class="spinner"></span>
              <span>Assistant is typing</span>
            </div>
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about products or routines…"
              autocomplete="off"
              required
              aria-label="Your beauty question"
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <p>© 2025 L'Oréal. Crafted for elegant beauty guidance.</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
